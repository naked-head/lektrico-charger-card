name: Tag & Release

# When package.json's version changes on main, create the matching git
# tag and a GitHub Release (body = the CHANGELOG.md section for that
# version). Publishing the release triggers release.yml, which builds
# the card and attaches dist/lektrico-charger-card.js to it.
#
# To ship a new version: bump "version" in package.json, add a section
# to CHANGELOG.md ("## [x.y.z] - yyyy-mm-dd"), merge to main.

on:
  push:
    branches: [main]
    paths:
      - package.json

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check whether the tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract CHANGELOG.md section
        if: steps.check.outputs.exists == 'false'
        run: |
          awk -v ver="${{ steps.version.outputs.value }}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG.md section found for version ${{ steps.version.outputs.value }} — add one before merging." >&2
            exit 1
          fi

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.value }}" \
            --title "v${{ steps.version.outputs.value }}" \
            --notes-file release_notes.md \
            --target "${{ github.sha }}"
