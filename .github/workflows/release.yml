name: Release

# Triggered only by pushing a version tag (v1.2.3) — nothing fires
# automatically on a normal push/merge to main.
#
# To ship a new version: bump "version" in package.json and
# CARD_VERSION in src/const.js, add a "## [x.y.z] - yyyy-mm-dd" section
# to CHANGELOG.md, commit, then:
#   git tag v1.2.3 && git push origin v1.2.3

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check package.json version matches the tag
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$pkg_version" != "${{ steps.version.outputs.value }}" ]; then
            echo "package.json version ($pkg_version) does not match tag ${{ github.ref_name }} — bump it before tagging." >&2
            exit 1
          fi

      - name: Extract CHANGELOG.md section
        run: |
          awk -v ver="${{ steps.version.outputs.value }}" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG.md section found for version ${{ steps.version.outputs.value }} — add one before tagging." >&2
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: dist/lektrico-charger-card.js
