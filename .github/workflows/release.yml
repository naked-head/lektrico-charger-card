name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Attach built card to release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Upload lektrico-charger-card.js
        uses: softprops/action-gh-release@v2
        with:
          files: dist/lektrico-charger-card.js
