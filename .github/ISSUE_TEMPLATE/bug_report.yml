name: Bug Report
description: Report a problem with the Lektri.co Charger Card
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening an issue, please check if a similar one already exists.
        A screenshot and your card configuration are essential to diagnose rendering problems.

  - type: input
    id: card_version
    attributes:
      label: Card version
      description: Shown in the browser console on load, or found in CHANGELOG.md.
      placeholder: "e.g. 1.5.3"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: Found in Settings → About.
      placeholder: "e.g. 2026.7.1"
    validations:
      required: true

  - type: input
    id: charger_model
    attributes:
      label: Charger model
      description: Which Lektri.co model? Single-phase and three-phase chargers render differently.
      placeholder: "e.g. 1P7K, 3P22K"
    validations:
      required: true

  - type: dropdown
    id: has_meter
    attributes:
      label: Load balancing meter
      description: Do you have the Lektri.co energy meter (load balancing device) installed?
      options:
        - "No meter"
        - "Meter installed"
    validations:
      required: true

  - type: dropdown
    id: install_method
    attributes:
      label: How did you install the card?
      options:
        - HACS
        - Manual (resource added by hand)
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Which browser and platform? Rendering bugs are often browser-specific.
      placeholder: "e.g. Firefox 128 on Linux, Safari on iOS"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the problem clearly. What did you expect, what happened instead?
    validations:
      required: true

  - type: textarea
    id: card_config
    attributes:
      label: Card configuration (YAML)
      description: The full YAML of the card from the dashboard, with entity names anonymized if needed.
      render: yaml
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Browser console output
      description: Open developer tools (F12) → Console, reproduce the issue, and paste any errors here.
      render: text
    validations:
      required: false

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Drag and drop a screenshot showing the problem. For rendering issues this is the single most useful thing you can provide.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else relevant — entity naming language (Italian/English), other custom cards, theme in use, etc.
    validations:
      required: false